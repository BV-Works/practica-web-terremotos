<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRACTICA TERREMOTOS</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./style.css" />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet-providers@latest/leaflet-providers.js"></script>
  </head>

  <body>
    <div class="map-container">
      <div class="map-wrapper">
        <p class="map-title">Mapa Favoritos</p>
        <div id="map1"></div>
      </div>

      <div class="map-wrapper">
        <p class="map-title">Mapa Filtrado</p>
        <div id="map2"></div>

        <div class="filters-container">
          <label>
            Magnitud mínima:
            <input
              type="number"
              id="minMag"
              step="1"
              min="1"
              max="7"
              value="1"
              required
            />
          </label>

          <label>
            Fecha inicio:
            <input
              type="date"
              id="startDate"
              min="2024-01-01"
              max=""
              value="2024-01-01"
              required
            />
          </label>

          <label>
            Fecha fin:
            <input type="date" id="endDate" min="2024-01-01" max="" required />
          </label>
          <button id="filtrarBtn">Filtrar terremotos</button>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
