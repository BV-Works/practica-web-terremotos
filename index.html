<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRACTICA TERREMOTOS</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./style.css" />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet-providers@latest/leaflet-providers.js"></script>
  </head>

  <body>
    <section class="auth-container">
      <div class="auth-box">
        <h3 class="auth-title" id="authTitle">Login</h3>

        <form id="authForm">
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="authEmail" required />
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" id="authPassword" required />
          </div>

          <button type="submit" id="authButton">Entrar</button>
        </form>

        <p class="auth-toggle" id="authToggle">¿No estás registrado?</p>

        <div class="welcome-message hidden" id="welcomeMessage"></div>
        <button class="logout-btn hidden" id="logoutBtn">Cerrar sesión</button>
      </div>
    </section>

    <section class="map-container">
      <div class="map-wrapper">
        <p class="map-title">Mapa Favoritos</p>
        <div id="map1"></div>
      </div>

      <div class="map-wrapper">
        <p class="map-title">Mapa Filtrado</p>
        <div id="map2"></div>
        <div class="filters-container">
                  <div id="errorMsg" style="color:red; margin-top:10px;"></div>

          <label>
            Magnitud mínima:
            <input
              type="number"
              id="minMag"
              step="1"
              min="1"
              max="7"
              value="7"
              required
            />
          </label>

          <label>
            Fecha inicio:
            <input
              type="date"
              id="startDate"
              min="2024-01-01"
              max=""
              value="2024-01-01"
              required
            />
          </label>

          <label>
            Fecha fin:
            <input type="date" id="endDate" min="2024-01-01" max="" required />
          </label>
          <button id="filtrarBtn">Filtrar terremotos</button>
        </div>
      </div>
    </section>
    <script src="https://www.gstatic.com/firebasejs/8.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.7.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.7.1/firebase-auth.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
